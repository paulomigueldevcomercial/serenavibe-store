services:
  db:
    image: mariadb:11.4
    container_name: serenavibe-db
    restart: always
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wpuser
      MARIADB_PASSWORD: ShadowDev123
      MARIADB_ROOT_PASSWORD: changeme-serenavibe-root-password
    volumes:
      - ./data/db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -p$$MARIADB_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  wordpress:
    image: wordpress:latest
    container_name: serenavibe-wordpress
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: ShadowDev123
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - ./data/wordpress:/var/www/html
    expose:
      - "80"
    networks:
      default:
      serenavibe_proxy:
        aliases:
          - serenavibe-wordpress

networks:
  serenavibe_proxy:
    external: true
    name: ${SERENAVIBE_PROXY_NETWORK:-goldeplaca_proxy}
