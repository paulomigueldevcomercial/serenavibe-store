services:
  wordpress:
    image: wordpress:latest
    container_name: serenavibe-wordpress
    restart: always
    environment:
      WORDPRESS_DB_HOST: wordpress-2.cp8cqkwqmsaz.us-east-2.rds.amazonaws.com:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: ShadowDev123
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - ./data/wordpress:/var/www/html
    expose:
      - "80"
    networks:
      serenavibe_proxy:
        aliases:
          - serenavibe-wordpress

networks:
  serenavibe_proxy:
    external: true
    name: ${SERENAVIBE_PROXY_NETWORK:-goldeplaca_proxy}
